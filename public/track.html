<!DOCTYPE html>
<html>
<head>
    <title>LifeGuardian+ Live Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🗺️ Mapbox CSS -->
    <link
            href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
            rel="stylesheet"
    />

    <!-- 🗺️ Mapbox JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <!-- 🔥 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>

<body>
<div id="map"></div>

<script>
    // 🔐 Mapbox Public Token (REPLACE THIS)
    mapboxgl.accessToken = "YOUR_MAPBOX_TOKEN";

    // 🔥 Firebase config (UNCHANGED)
    const firebaseConfig = {
      apiKey: "AIzaSyDWu--vYA0BChhTzGMsHkkLz79tGVQVkHo",
      authDomain: "lifeguardianplus-daeb0.firebaseapp.com",
      databaseURL: "https://lifeguardianplus-daeb0-default-rtdb.firebaseio.com",
      projectId: "lifeguardianplus-daeb0",
      storageBucket: "lifeguardianplus-daeb0.firebasestorage.app",
      messagingSenderId: "14613863310",
      appId: "1:14613863310:web:8b3d8f9405fb25ef5b22df"
    };

    firebase.initializeApp(firebaseConfig);

    // 🔑 Get UID from URL
    const uid = new URLSearchParams(window.location.search).get("uid");
    if (!uid) {
      alert("Invalid tracking link");
      throw new Error("UID missing");
    }

    // 🗺️ Initialize Mapbox map
    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/streets-v12",
      center: [0, 0],   // [lng, lat]
      zoom: 16
    });

    // 📍 Create marker (once)
    const marker = new mapboxgl.Marker({ color: "red" });

    // 🔄 Listen to Firebase live updates
    firebase.database()
      .ref("live_tracking/" + uid)
      .on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data || data.isSharing === false) return;

        const lngLat = [data.lng, data.lat];

        // First time → add marker + move camera
        if (!marker.getLngLat()) {
          marker.setLngLat(lngLat).addTo(map);
          map.flyTo({ center: lngLat, zoom: 16 });
        } else {
          // Update marker position only
          marker.setLngLat(lngLat);
        }
      });
</script>
</body>
</html>

name: lifeguardianplus
description: "A Smart Personal Safety & Emergency Companion App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  google_sign_in: ^6.2.1
  intl: ^0.19.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  image_picker: ^1.2.1
  firebase_storage: ^13.0.5
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.2
  http: ^1.6.0
  qr_flutter: ^4.1.0
  firebase_database: ^12.1.1
  location: ^5.0.3
  mapbox_maps_flutter: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/marker.png
    - assets/images/app_icon.png
    - assets/images/app_icon_foreground.png